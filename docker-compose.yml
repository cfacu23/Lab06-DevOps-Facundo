services:
  lab06-app:
    build:
      context: .
      dockerfile: app/Dockerfile
    image: lab06-devops-facundo:1.0.0
    container_name: lab06-devops-app
    restart: unless-stopped
    ports:
      - "8080:3000"
    environment:
      NODE_ENV: production
      APP_VERSION: "1.0.0"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s