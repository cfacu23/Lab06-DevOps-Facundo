name: CI - Build, Test and Package

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-test-package:
    name: Validar aplicacion y generar artifact
    runs-on: ubuntu-latest

    steps:
      - name: Descargar codigo del repositorio
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Instalar dependencias
        working-directory: app
        run: npm ci

      - name: Validar sintaxis de la aplicacion
        working-directory: app
        run: npm run lint

      - name: Ejecutar pruebas automaticas
        working-directory: app
        run: npm test

      - name: Construir imagen Docker
        run: docker compose build

      - name: Crear paquete de despliegue
        run: |
          mkdir -p artifact
          tar -czf artifact/lab06-devops-artifact.tar.gz app web scripts docker-compose.yml .dockerignore README.md docs

      - name: Publicar artifact del laboratorio
        uses: actions/upload-artifact@v4
        with:
          name: lab06-devops-artifact
          path: artifact/lab06-devops-artifact.tar.gz
          retention-days: 7